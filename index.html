<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Dashboard - Sign In</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-slate-300 h-screen w-screen flex items-center justify-center overflow-hidden relative">

    <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] mix-blend-overlay"></div>
    
    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl flex flex-col items-center justify-center p-10 z-10 shadow-2xl relative">
        
        <div class="relative z-10 w-full">
            
            <div class="text-center mb-8">
                <div class="text-5xl text-indigo-400 font-bold mb-3 drop-shadow-md">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-wide">AI Powered Business Dashboard</h1>
                <p class="text-sm text-slate-400 mt-2">Smart Analytics & Insights</p>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-inner">
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-400 mb-1">Email Address</label>
                        <input type="email" id="email" placeholder="name@company.com" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500 transition-colors" required>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-400 mb-1">Password</label>
                        <input type="password" id="password" placeholder="••••••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500 transition-colors" required>
                    </div>
                    <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                        Log In
                    </button>
                    <div class="flex justify-between items-center mt-4 text-sm">
                        <a href="#" class="text-indigo-400 hover:text-indigo-300 transition-colors">Forgot Password?</a>
                        <a href="#" class="text-indigo-400 hover:text-indigo-300 transition-colors">Request Access</a>
                    </div>
                </form>
            </div>
            
            <p class="text-center text-sm mt-6 text-slate-500">
                Sign in to your account. Or <a href="#" class="text-indigo-400 hover:underline">Create New Account</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
